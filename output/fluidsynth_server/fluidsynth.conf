########################################
# FluidSynth Default Configuration
# Datei: ~/.fluidsynth
# Version: für FluidSynth v2.3.x
# Syntax: KEIN "=" benutzen, immer "set <option> <wert>"
########################################

########################################
# Grundlegende Audioeinstellungen
########################################

# Master-Gain (Lautstärke) – typischerweise 0.5–1.0
set synth.gain 0.5

# Automatisches Verbinden mit MIDI-Eingängen (sehr praktisch im Alltag)
set midi.autoconnect no

########################################
# Reverb (Hall) – mehr Räumlichkeit
########################################

# Aktivieren
set synth.reverb.active yes
# Raumgröße: 0.0 – 1.0 (je größer, desto länger der Hall)
set synth.reverb.room-size 0.4
# Höhenbedämpfung: 0.0 – 1.0 (mehr = „wärmerer“ Hall)
set synth.reverb.damp 0.6
# Stereo-Breite: 0 – 100
set synth.reverb.width 80
# Reverb-Lautstärke: 0.0 – 1.0
set synth.reverb.level 0.25

########################################
# Chorus – satter, breiter Klang
########################################

# Aktivieren (optional – sorgt für einen breiteren, lebendigeren Sound)
set synth.chorus.active yes
# Stimmenanzahl: 0–99 (mehr = breiter, CPU-lastiger)
set synth.chorus.nr 5
# Modulationsgeschwindigkeit (Hz): 0.29 – 5.0
set synth.chorus.speed 0.3
# Tiefe: 0.0 – 21.0
set synth.chorus.depth 8.0
# Pegel: 0.0 – 10.0
set synth.chorus.level 2.0

########################################
# Sonstiges (optional)
########################################

# Polyphonie erhöhen (Standard ist oft 256)
set synth.polyphony 512

